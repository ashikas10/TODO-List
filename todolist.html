<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link rel="stylesheet" href="todostyle.css"> 
</head>
<body class="hero">
    <header>
        <h1>ToDo List</h1>
    </header>

    <div class="hero-body">
        <input type="text" id="things" placeholder="Enter Item">
        <button class="btn-add" onclick="add()">Add</button>
        <ul id="list"></ul>
        
    </div>

</body>
<script>
    var Things = document.getElementById("things");
    var list = document.getElementById("list");
    var editItem = null; 
    function add(){
        let value = Things.value.trim();
        if(value==""){
            alert("Please Add Item")
            return
        }
        if(editItem == null){
            var listItem = document.createElement("li");
            listItem.innerHTML = value +
            ' <button onclick="deleteItem(event)" class="btn-del">Delete</button>' +
            ' <button onclick="change(event)" class="btn-edit">Edit</button>';

            list.append(listItem);
        }
        else{
            editItem.firstChild.textContent = value;
            editItem = null;
        }

        Things.value = "";
    }

    function deleteItem(event) {
        event.target.parentElement.remove();
    }

    function change(event){
        editItem = event.target.parentElement;
        Things.value = editItem.firstChild.textContent.trim();
    }
</script>
</html>
